name: Build & Deploy untoldstory.click

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate secrets
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          set -euo pipefail
          missing=0
          for key in VITE_SUPABASE_URL VITE_SUPABASE_ANON_KEY; do
            if [ -z "${!key:-}" ]; then
              echo "::error::Missing GitHub secret: $key"
              missing=1
            fi
          done
          if [ -z "${VERCEL_TOKEN:-}" ] || [ -z "${VERCEL_ORG_ID:-}" ] || [ -z "${VERCEL_PROJECT_ID:-}" ]; then
            echo "::warning::Vercel deploy secrets missing (VERCEL_TOKEN / VERCEL_ORG_ID / VERCEL_PROJECT_ID)."
            echo "Add them from Vercel → Settings → Tokens + Project General, then re-run."
            echo "vercel_skip=1" >> "$GITHUB_ENV"
          else
            echo "vercel_skip=0" >> "$GITHUB_ENV"
          fi
          if [ "$missing" -ne 0 ]; then exit 1; fi

      - name: Build
        env:
          VITE_USE_SUPABASE: ${{ secrets.VITE_USE_SUPABASE }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_PUBLIC_APP_URL: ${{ secrets.VITE_PUBLIC_APP_URL }}
          NODE_OPTIONS: --max-old-space-size=6144
        run: npm run build

      - name: Install Vercel CLI
        if: env.vercel_skip == '0'
        run: npm i -g vercel@latest

      - name: Deploy prebuilt to Vercel (untoldstory.click)
        if: env.vercel_skip == '0'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          set -euo pipefail
          node scripts/vercel-prebuilt.mjs
          vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"

      - name: Verify live site bundle
        env:
          VITE_PUBLIC_APP_URL: ${{ secrets.VITE_PUBLIC_APP_URL }}
        run: |
          set -euo pipefail
          BUNDLE=$(grep -oE 'assets/index-[A-Za-z0-9_-]+\.js' dist/index.html | head -1 || true)
          echo "Built bundle: ${BUNDLE:-unknown}"
          ORIGIN="${VITE_PUBLIC_APP_URL:-https://untoldstory.click}"
          ORIGIN="${ORIGIN%/}"
          sleep 10
          HTML=$(curl -fsSL --max-time 45 "$ORIGIN/" || true)
          if [ -z "$HTML" ]; then
            echo "::warning::Could not fetch $ORIGIN"
            exit 0
          fi
          LIVE=$(echo "$HTML" | grep -oE 'assets/index-[A-Za-z0-9_-]+\.js' | head -1 || true)
          echo "Live bundle: ${LIVE:-none}"
          if [ -n "$BUNDLE" ] && echo "$HTML" | grep -q "$BUNDLE"; then
            echo "Live site serves the new bundle ($BUNDLE)."
          elif [ "${{ env.vercel_skip }}" = "1" ]; then
            echo "::warning::Vercel secrets not set — build OK but site not deployed."
          else
            echo "::warning::Live bundle may still be propagating (built: $BUNDLE, live: $LIVE)."
          fi
